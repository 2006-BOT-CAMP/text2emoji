<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>text2emoji</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: monospace; overflow: hidden; }

    #hydra-canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

    /* — loading overlay: CSS nativo, no pasa por WebGL — */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 66.67vh;
      gap: 1.5rem;
      padding-left: 3rem;
      padding-right: 3rem;
      pointer-events: none;
    }
    #loading-overlay.active { display: flex; }

    #loading-text {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(1rem, 4vw, 3rem);
      font-weight: 300;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.05em;
      text-align: center;
      max-width: 100%;
    }

    #loading-spinner {
      width: 2.4rem;
      height: 2.4rem;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading-spinner.hidden { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* — editor hydra — */
    #hydra-editor {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 380px;
      transition: opacity 0.2s;
    }
    #hydra-editor.hidden { opacity: 0; pointer-events: none; }

    #hydra-code {
      width: 100%;
      height: 140px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      color: #7fff7f;
      font-family: monospace;
      font-size: 0.82rem;
      padding: 0.6rem;
      resize: vertical;
      outline: none;
      line-height: 1.5;
    }

    #hydra-status {
      font-size: 0.75rem;
      padding: 0 0.2rem;
      height: 1rem;
      color: rgba(255,255,255,0.4);
    }
    #hydra-status.ok  { color: #7fff7f; }
    #hydra-status.err { color: #ff6b6b; }

    /* — control fondo — */
    #bg-control {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #bg-control label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
    }
    #bg-slider {
      -webkit-appearance: none;
      width: 80px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(to right, #fff, #000);
      outline: none;
      cursor: pointer;
    }
    #bg-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.3);
    }

    /* — input traducción — */
    #input-bar {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    #text-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 0.6rem 1rem;
      font-family: monospace;
      font-size: 1rem;
      width: 400px;
      outline: none;
    }
    #text-input::placeholder { color: rgba(255,255,255,0.3); }

    #send-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 0.6rem 1.2rem;
      font-family: monospace;
      cursor: pointer;
    }
    #send-btn:hover   { background: rgba(255,255,255,0.2); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

  <canvas id="hydra-canvas"></canvas>

  <!-- overlay de carga: texto + spinner renderizados como DOM, no a través de WebGL -->
  <div id="loading-overlay">
    <div id="loading-text"></div>
    <div id="loading-spinner"></div>
  </div>

  <div id="hydra-editor">
    <!--
    <textarea id="hydra-code" spellcheck="false">src(s0).out(o0)</textarea>
    -->
    <textarea id="hydra-code" spellcheck="false">src(s0)
.scrollX(() => time/10)
.out(o0)</textarea>
    <div id="hydra-status">ctrl+enter para ejecutar · tab para ocultar</div>
  </div>

  <div id="bg-control">
    <label for="bg-slider">bg</label>
    <input id="bg-slider" type="range" min="0" max="255" value="128">
  </div>

  <div id="input-bar">
    <input id="text-input" type="text" placeholder="escribe algo..." autocomplete="off" />
    <button id="send-btn">→</button>
  </div>

  <script src="https://unpkg.com/hydra-synth"></script>

  <!-- eval en script no-módulo para acceder a los globales de Hydra (time, mouse, osc...) -->
  <script>
    window._hydraEval = function(code) { return eval(code) }
  </script>

  <script type="module">
    import { initHydra, showEmojis, clearCanvas, setBgColor, refreshCanvas } from '/src/renderer/hydra.js'

    const dpr     = window.devicePixelRatio || 1
    const physW   = Math.round(window.innerWidth  * dpr)
    const physH   = Math.round(window.innerHeight * dpr)
    const hCanvas = document.getElementById('hydra-canvas')

    console.log(`[init] window: ${window.innerWidth}×${window.innerHeight} css, dpr: ${dpr}, target: ${physW}×${physH}`)

    new Hydra({ canvas: hCanvas, detectAudio: false, width: physW, height: physH })

    console.log(`[init] hydra canvas after init: ${hCanvas.width}×${hCanvas.height}`)

    initHydra()

    // — editor hydra —
    const codeEl   = document.getElementById('hydra-code')
    const statusEl = document.getElementById('hydra-status')
    const editor   = document.getElementById('hydra-editor')

    function runHydra() {
      try {
        window._hydraEval(codeEl.value)
        statusEl.textContent = '✓ ok'
        statusEl.className = 'ok'
        setTimeout(() => {
          statusEl.textContent = 'ctrl+enter para ejecutar · tab para ocultar'
          statusEl.className = ''
        }, 1500)
      } catch (e) {
        statusEl.textContent = '✗ ' + e.message
        statusEl.className = 'err'
      }
    }

    runHydra()

    codeEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault()
        runHydra()
      }
    })

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Tab' && e.target !== codeEl && e.target !== document.getElementById('text-input')) {
        e.preventDefault()
        editor.classList.toggle('hidden')
      }
    })

    // — traducción —
    const input      = document.getElementById('text-input')
    const btn        = document.getElementById('send-btn')
    const overlay    = document.getElementById('loading-overlay')
    const loadText   = document.getElementById('loading-text')
    const spinner    = document.getElementById('loading-spinner')

    const MIN_LOADING_MS = 5000
    const TEXT_LINGER_MS = 2000

    async function submit() {
      const text = input.value.trim()
      if (!text) return
      input.value = ''
      btn.disabled = true

      loadText.textContent = text
      spinner.classList.remove('hidden')
      overlay.classList.add('active')
      const t0 = Date.now()
      console.log(`[translate] → "${text}"`)

      try {
        const res = await fetch('/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        })
        const { emojis, error, cached } = await res.json()
        if (error) throw new Error(error)
        console.log(`[translate] ← ${emojis}${cached ? ' (cached)' : ''}`)
        const elapsed = Date.now() - t0
        if (elapsed < MIN_LOADING_MS) await new Promise((r) => setTimeout(r, MIN_LOADING_MS - elapsed))
        spinner.classList.add('hidden')
        await showEmojis(emojis)
        setTimeout(() => overlay.classList.remove('active'), TEXT_LINGER_MS)
      } catch (err) {
        console.error('[translate] ✗', err.message)
        overlay.classList.remove('active')
        clearCanvas()
      } finally {
        btn.disabled = false
        input.focus()
      }
    }

    btn.addEventListener('click', submit)
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit() })

    // — control fondo —
    const bgSlider = document.getElementById('bg-slider')
    bgSlider.addEventListener('input', () => {
      const v = bgSlider.value
      setBgColor(`rgb(${v},${v},${v})`)
      refreshCanvas()
    })
  </script>

</body>
</html>
